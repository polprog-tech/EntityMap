# EntityMap — Actions & Fragility Summary Card
#
# Rescan button + fragility issue count in a compact row.
# Press the button to trigger an immediate full dependency scan.
#
# How to add:
#   1. Open your dashboard, click pencil icon (Edit)
#   2. Click "+ Add Card" > "Manual"
#   3. Paste this YAML and click "Save"

type: grid
columns: 2
square: false
cards:
  - type: button
    entity: button.entitymap_rescan
    name: "🔄 Rescan Dependencies"
    icon: mdi:refresh
    tap_action:
      action: toggle
    show_state: false
    icon_height: 48px

  - type: entities
    title: "⚠️ Fragility Summary"
    entities:
      - entity: sensor.entitymap_fragility_issues
        name: Fragility Issues
        icon: mdi:alert-outline
      - entity: sensor.entitymap_last_scan
        name: Last Scan
        icon: mdi:clock-check-outline
