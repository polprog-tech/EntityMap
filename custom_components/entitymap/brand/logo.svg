<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29B6F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg-grad)" />

  <!-- Graph edges (dependency connections) -->
  <g stroke="#ffffff" stroke-width="3" stroke-opacity="0.35" stroke-linecap="round">
    <!-- Central hub connections -->
    <line x1="256" y1="256" x2="152" y2="152" />
    <line x1="256" y1="256" x2="360" y2="152" />
    <line x1="256" y1="256" x2="152" y2="360" />
    <line x1="256" y1="256" x2="360" y2="360" />
    <!-- Outer connections -->
    <line x1="152" y1="152" x2="120" y2="232" />
    <line x1="360" y1="152" x2="392" y2="232" />
    <line x1="152" y1="360" x2="120" y2="280" />
    <line x1="360" y1="360" x2="392" y2="280" />
    <!-- Cross connections -->
    <line x1="152" y1="152" x2="360" y2="152" />
    <line x1="152" y1="360" x2="360" y2="360" />
  </g>

  <!-- Outer nodes (smaller, secondary) -->
  <g>
    <circle cx="120" cy="232" r="16" fill="#ffffff" fill-opacity="0.5" />
    <circle cx="392" cy="232" r="16" fill="#ffffff" fill-opacity="0.5" />
    <circle cx="120" cy="280" r="16" fill="#ffffff" fill-opacity="0.5" />
    <circle cx="392" cy="280" r="16" fill="#ffffff" fill-opacity="0.5" />
  </g>

  <!-- Primary corner nodes -->
  <g>
    <circle cx="152" cy="152" r="24" fill="url(#accent-grad)" />
    <circle cx="360" cy="152" r="24" fill="url(#accent-grad)" />
    <circle cx="152" cy="360" r="24" fill="url(#accent-grad)" />
    <circle cx="360" cy="360" r="24" fill="url(#accent-grad)" />
  </g>

  <!-- Central node (hero, largest) -->
  <circle cx="256" cy="256" r="40" fill="#ffffff" />
  <circle cx="256" cy="256" r="28" fill="url(#bg-grad)" />
  <circle cx="256" cy="256" r="12" fill="#ffffff" />

  <!-- Magnifying glass / insight symbol over center-right -->
  <g transform="translate(310, 180)" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85">
    <circle cx="0" cy="0" r="22" />
    <line x1="16" y1="16" x2="32" y2="32" />
  </g>
</svg>
